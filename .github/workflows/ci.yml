name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - name: yarn install
        run: yarn install --frozen-lockfile
      - name: tsc
        run: yarn tsc
      - name: lint
        run: yarn lint:all
      - name: prettier
        run: yarn prettier:check
